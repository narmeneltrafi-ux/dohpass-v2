[functions.stripe-webhook]
verify_jwt = false

# create-checkout verifies the caller's JWT in-function via GoTrue
# (supabase.auth.getUser) rather than at the gateway. Reason: the
# Edge Functions gateway currently rejects both ES256
# (UNAUTHORIZED_UNSUPPORTED_TOKEN_ALGORITHM) and HS256
# (UNAUTHORIZED_LEGACY_JWT) tokens on this project, leaving no
# gateway-compatible algorithm. In-function verification calls
# GoTrue directly, which accepts the current HS256 signing key.
# See: https://github.com/narmeneltrafi-ux/dohpass-v2/issues (Supabase
# support ticket pending).
[functions.create-checkout]
verify_jwt = false

# create-portal-session uses the same in-function GoTrue verification
# as create-checkout; same gateway algorithm-rejection workaround applies.
[functions.create-portal-session]
verify_jwt = false

# The three content-generation functions below are invoked by pg_cron
# with a service-role bearer (HS256). The Edge Functions gateway
# currently rejects HS256 as UNAUTHORIZED_LEGACY_JWT on this project,
# so JWT verification must stay off at the gateway or the cron calls
# will 401. These rows pin the setting so a CLI redeploy doesn't
# silently re-enable verification. Source pulled from deployed state
# on 2026-04-21 — see PR notes.
[functions.generate-questions]
verify_jwt = false

[functions.review-questions]
verify_jwt = false

[functions.generate-flashcards]
verify_jwt = false
